<a
  [routerLink]="link()"
  [class]="'block h-full group relative bg-white rounded-2xl shadow-lg hover:shadow-2xl transition-all duration-300 overflow-hidden border border-gray-100 hover:-translate-y-1 ' + accentBorderClass()"
>
  <div [class]="'absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity bg-gradient-to-br ' + accentOverlayClass()"></div>

  <div class="relative p-8">
    <div class="w-16 h-16 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform" [class]="'w-16 h-16 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform ' + accentIconBgClass()">
      <svg class="w-8 h-8" [class]="'w-8 h-8 ' + accentIconColorClass()" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        @if (icon() === 'habitaciones') {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        } @else {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
        }
      </svg>
    </div>

    <h3 class="text-2xl font-bold text-gray-900 mb-3">{{ title() }}</h3>
    <p class="text-gray-600 mb-6">{{ description() }}</p>

    <div class="flex items-center font-semibold group-hover:gap-2 transition-all" [class]="'flex items-center font-semibold group-hover:gap-2 transition-all ' + accentTextClass()">
      <span>{{ cta() }}</span>
      <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </div>
  </div>
</a>
