@if (show()) {
  <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full transform transition-all">
      <div class="p-6 border-b border-gray-200">
        <div class="flex items-center justify-between">
          <h3 class="text-xl font-bold text-gray-900">
            {{ isEditing() ? 'Editar Habitacion' : 'Nueva Habitacion' }}
          </h3>
          <button
            (click)="onClose()"
            class="text-gray-400 hover:text-gray-600 transition-colors"
            type="button"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Nombre <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [value]="formData().nombre"
            (input)="onFieldChange('nombre', $any($event.target).value)"
            placeholder="Ej: Habitacion 101"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Planta <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [value]="formData().planta"
            (input)="onFieldChange('planta', $any($event.target).value)"
            placeholder="Ej: 1"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Capacidad <span class="text-red-500">*</span>
          </label>
          <select
            [value]="formData().capacidad"
            (change)="onFieldChange('capacidad', $any($event.target).value)"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
            <option value="INDIVIDUAL">Individual</option>
            <option value="DOBLE">Doble</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Observaciones
          </label>
          <textarea
            [value]="formData().observaciones || ''"
            (input)="onFieldChange('observaciones', $any($event.target).value)"
            placeholder="Notas adicionales sobre la habitacion..."
            rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
          ></textarea>
        </div>
      </div>

      <div class="p-6 border-t border-gray-200 flex gap-3">
        <button
          (click)="onClose()"
          class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors"
          type="button"
        >
          Cancelar
        </button>
        <button
          (click)="onSave()"
          class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
          type="button"
        >
          {{ isEditing() ? 'Actualizar' : 'Crear' }}
        </button>
      </div>
    </div>
  </div>
}
