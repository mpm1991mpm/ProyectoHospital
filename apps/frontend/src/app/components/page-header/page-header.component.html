<header class="bg-white shadow-sm border-b border-gray-100 relative z-10">
  <div class="max-w-7xl mx-auto px-6 py-4">
    <div class="flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        @if (showMenuMobile()) {
          <button
            type="button"
            (click)="onMenuMobileClick()"
            class="lg:hidden text-gray-500 hover:text-gray-700 transition-colors"
            aria-label="Abrir menu"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01"/>
            </svg>
          </button>
        }
        @if (showBack()) {
          <a [routerLink]="backLink()" class="text-gray-400 hover:text-gray-600 transition-colors" aria-label="Volver">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
          </a>
        }

        <svg class="w-8 h-8 shrink-0" [class]="'w-8 h-8 shrink-0 ' + iconColorClass()" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @switch (icon()) {
            @case ('habitaciones') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            }
            @case ('pacientes') {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0"/>
            }
            @default {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            }
          }
        </svg>

        <h1 class="text-2xl font-bold text-gray-900 truncate">{{ title() }}</h1>
      </div>

      <div class="flex items-center gap-2 shrink-0">
        @if (secondaryButtonLabel()) {
          <button
            type="button"
            (click)="onSecondaryClick()"
            class="px-3 py-2 text-sm rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-50"
          >
            {{ secondaryButtonLabel() }}
          </button>
        }

        @if (primaryButtonLabel()) {
          <button
            type="button"
            (click)="onPrimaryClick()"
            [class]="'flex items-center gap-2 text-white px-4 py-2 rounded-lg transition-colors shadow-sm ' + primaryButtonColorClass()"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            {{ primaryButtonLabel() }}
          </button>
        }
      </div>
    </div>
  </div>
</header>
