<div class="min-h-screen bg-gradient-to-br from-green-50 via-white to-green-50 lg:flex">
  <app-sidebar-nav [mobileOpen]="mobileSidebarOpen()" (closeMobile)="closeMobileSidebar()" />

  <div class="flex-1 min-w-0">
    <app-page-header
      title="Gestión de Pacientes"
      icon="pacientes"
      iconColorClass="text-green-600"
      [showBack]="false" [showMenuMobile]="true" (menuMobileClick)="toggleMobileSidebar()"
      backLink="/"
      primaryButtonLabel="Nuevo Paciente"
      primaryButtonColorClass="bg-green-600 hover:bg-green-700"
      (primaryClick)="openCreateModal()"
    />

    <main class="max-w-7xl mx-auto px-6 py-8">
      <app-buscador-pacientes
        [searchTerm]="searchTerm()"
        [altaFilter]="altaFilter()"
        [revisadoFilter]="revisadoFilter()"
        [unidadFilter]="unidadFilter()"
        [sortField]="sortField()"
        [sortDirection]="sortDirection()"
        (searchTermChange)="searchTerm.set($event)"
        (altaFilterChange)="altaFilter.set($event)"
        (revisadoFilterChange)="revisadoFilter.set($event)"
        (unidadFilterChange)="unidadFilter.set($event)"
        (sortFieldChange)="sortField.set($event)"
        (sortDirectionChange)="sortDirection.set($event)"
      />

      <div class="mb-4 inline-flex rounded-lg border border-gray-200 bg-white p-1">
        <button
          type="button"
          (click)="viewMode.set('tabla')"
          class="px-3 py-2 text-sm rounded-md transition-colors"
          [class.bg-green-600]="viewMode() === 'tabla'"
          [class.text-white]="viewMode() === 'tabla'"
          [class.text-gray-700]="viewMode() !== 'tabla'"
        >
          Tabla General
        </button>
        <button
          type="button"
          (click)="viewMode.set('habitaciones')"
          class="px-3 py-2 text-sm rounded-md transition-colors"
          [class.bg-green-600]="viewMode() === 'habitaciones'"
          [class.text-white]="viewMode() === 'habitaciones'"
          [class.text-gray-700]="viewMode() !== 'habitaciones'"
        >
          Por Habitación
        </button>
      </div>

      @if (viewMode() === 'tabla') {
        <app-tabla-pacientes
          [pacientes]="filteredPacientes()"
          [loading]="loading()"
          (editPaciente)="openEditModal($event)"
          (deletePaciente)="deletePaciente($event)"
          (markReviewed)="markPacienteRevisado($event)"
          (markColor)="markPacienteColor($event)"
        />
      } @else {
        <div class="space-y-6">
          @for (group of pacientesPorHabitacion(); track group.title) {
            <section>
              <div class="md:hidden">
                <button
                  type="button"
                  (click)="toggleRoomSection(group.title)"
                  class="w-full flex items-center justify-between px-4 py-3 rounded-xl border border-gray-200 bg-white shadow-sm"
                >
                  <span class="text-left">
                    <span class="block text-sm font-semibold text-gray-900">{{ group.title }}</span>
                    <span class="block text-xs text-gray-500">{{ group.pacientes.length }} pacientes</span>
                  </span>
                  <svg
                    class="w-5 h-5 text-gray-500 transition-transform"
                    [class.rotate-180]="isRoomSectionExpanded(group.title)"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </button>
                @if (isRoomSectionExpanded(group.title)) {
                  <div class="mt-2">
                    <app-tabla-pacientes
                      [pacientes]="group.pacientes"
                      [loading]="loading()"
                      (editPaciente)="openEditModal($event)"
                      (deletePaciente)="deletePaciente($event)"
                      (markReviewed)="markPacienteRevisado($event)"
                      (markColor)="markPacienteColor($event)"
                    />
                  </div>
                }
              </div>

              <div class="hidden md:block">
                <button
                  type="button"
                  (click)="toggleRoomSection(group.title)"
                  class="w-full mb-2 flex items-center justify-between px-4 py-3 rounded-xl border border-gray-200 bg-white shadow-sm hover:bg-gray-50 transition-colors"
                >
                  <span class="text-left">
                    <span class="block text-base font-semibold text-gray-900">{{ group.title }}</span>
                    <span class="block text-sm text-gray-500">{{ group.pacientes.length }} pacientes</span>
                  </span>
                  <svg
                    class="w-5 h-5 text-gray-500 transition-transform"
                    [class.rotate-180]="isRoomSectionExpanded(group.title)"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </button>
                @if (isRoomSectionExpanded(group.title)) {
                  <app-tabla-pacientes
                    [pacientes]="group.pacientes"
                    [loading]="loading()"
                    (editPaciente)="openEditModal($event)"
                    (deletePaciente)="deletePaciente($event)"
                    (markReviewed)="markPacienteRevisado($event)"
                    (markColor)="markPacienteColor($event)"
                  />
                }
              </div>
            </section>
          }
        </div>
      }
    </main>
  </div>

  <app-formulario-paciente
    [show]="showModal()"
    [isEditing]="isEditing()"
    [formData]="formData()"
    [habitaciones]="habitaciones()"
    (close)="closeModal()"
    (save)="savePaciente($event)"
  />
</div>
