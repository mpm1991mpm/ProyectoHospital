<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-blue-50 lg:flex">
  <app-sidebar-nav [mobileOpen]="mobileSidebarOpen()" (closeMobile)="closeMobileSidebar()" />

  <div class="flex-1 min-w-0">
    <app-page-header
      title="Gestion de Habitaciones"
      icon="habitaciones"
      iconColorClass="text-blue-600"
      [showBack]="false" [showMenuMobile]="true" (menuMobileClick)="toggleMobileSidebar()"
      backLink="/"
      primaryButtonLabel="Nueva Habitacion"
      primaryButtonColorClass="bg-blue-600 hover:bg-blue-700"
      (primaryClick)="openCreateModal()"
    />

    <main class="max-w-7xl mx-auto px-6 py-8">
      <app-buscador-habitaciones
        [searchTerm]="searchTerm()"
        (searchTermChange)="searchTerm.set($event)"
      />

      <app-tabla-habitaciones
        [habitaciones]="filteredHabitaciones()"
        [loading]="loading()"
        (editHabitacion)="openEditModal($event)"
        (deleteHabitacion)="deleteHabitacion($event)"
      />
    </main>
  </div>

  <app-formulario-habitacion
    [show]="showModal()"
    [isEditing]="isEditing()"
    [formData]="formData()"
    (close)="closeModal()"
    (save)="saveHabitacion()"
    (fieldChange)="updateFormField($event.field, $event.value)"
  />
</div>
