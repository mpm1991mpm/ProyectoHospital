<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-blue-50">
  <header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <a routerLink="/" class="text-gray-400 hover:text-gray-600 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
          </a>
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          <h1 class="text-2xl font-bold text-gray-900">Gestion de Habitaciones</h1>
        </div>
        <button
          (click)="openCreateModal()"
          class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors shadow-sm"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Nueva Habitacion
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <app-buscador-habitaciones
      [searchTerm]="searchTerm()"
      (searchTermChange)="searchTerm.set($event)"
    />

    <app-tabla-habitaciones
      [habitaciones]="filteredHabitaciones()"
      [loading]="loading()"
      (editHabitacion)="openEditModal($event)"
      (deleteHabitacion)="deleteHabitacion($event)"
    />
  </main>

  <app-formulario-habitacion
    [show]="showModal()"
    [isEditing]="isEditing()"
    [formData]="formData()"
    (close)="closeModal()"
    (save)="saveHabitacion()"
    (fieldChange)="updateFormField($event.field, $event.value)"
  />
</div>
