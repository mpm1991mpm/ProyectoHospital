<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-green-50">
  <app-page-header
    title="Hospital Management"
    icon="home"
    iconColorClass="text-blue-600"
    [secondaryButtonLabel]="fullscreenEnabled() ? (isFullscreen ? 'Salir pantalla completa' : 'Pantalla completa') : null"
    (secondaryClick)="toggleFullscreen()"
  />

  <main class="max-w-7xl mx-auto px-6 py-16">
    <div class="text-center mb-16">
      <h2 class="text-4xl font-bold text-gray-900 mb-4">Bienvenido al Sistema de Gestion</h2>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto">Gestiona habitaciones y pacientes de forma eficiente y organizada</p>
    </div>

    <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
      <app-home-section-card
        link="/habitaciones"
        title="Habitaciones"
        description="Administra las habitaciones del hospital, consulta disponibilidad y asigna pacientes"
        cta="Gestionar habitaciones"
        icon="habitaciones"
        accentBorderClass="hover:border-blue-200"
        accentOverlayClass="from-blue-500/5 to-blue-600/5"
        accentIconBgClass="bg-blue-100"
        accentIconColorClass="text-blue-600"
        accentTextClass="text-blue-600"
      />

      <app-home-section-card
        link="/pacientes"
        title="Pacientes"
        description="Gestiona el registro de pacientes, consulta informacion y asigna habitaciones"
        cta="Gestionar pacientes"
        icon="pacientes"
        accentBorderClass="hover:border-green-200"
        accentOverlayClass="from-green-500/5 to-green-600/5"
        accentIconBgClass="bg-green-100"
        accentIconColorClass="text-green-600"
        accentTextClass="text-green-600"
      />
    </div>

    <div class="mt-16 grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl mx-auto">
      <div class="bg-white rounded-xl p-6 text-center shadow-sm border border-gray-100">
        <div class="text-3xl font-bold text-blue-600 mb-2">{{ totalHabitaciones() }}</div>
        <div class="text-sm text-gray-600">Habitaciones</div>
      </div>
      <div class="bg-white rounded-xl p-6 text-center shadow-sm border border-gray-100">
        <div class="text-3xl font-bold text-green-600 mb-2">{{ totalPacientes() }}</div>
        <div class="text-sm text-gray-600">Pacientes</div>
      </div>
    </div>
  </main>
</div>
